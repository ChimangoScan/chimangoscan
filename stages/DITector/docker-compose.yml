services:
  mongodb:
    image: mongo:7.0
    container_name: chimangoscan_mongo
    profiles: [db]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:5.26
    container_name: chimangoscan_neo4j
    profiles: [db]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data

  crawler:
    image: golang:1.22
    container_name: chimangoscan_crawler
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    environment:
      - MONGO_URI=${MONGO_URI}
      - NEO4J_URI=${NEO4J_URI}
      - PAGE_CONCURRENCY=${PAGE_CONCURRENCY:-0}
      - ROLE=${ROLE:-primary}
    # Removed manual log redirection to prevent IO deadlocks
    command: sh -c "go build -buildvcs=false -o /tmp/chimangoscan . && /tmp/chimangoscan crawl --workers ${WORKERS:-3} --shard ${SHARD:-0} --shards ${SHARDS:-1} --accounts ${ACCOUNTS:-accounts.json} --config config.yaml"

# Docker-managed named volumes: a clean, disposable store for a reviewer's run
# (`docker compose down -v` wipes them), with no host-path permission issues.
volumes:
  mongo_data:
  neo4j_data:
