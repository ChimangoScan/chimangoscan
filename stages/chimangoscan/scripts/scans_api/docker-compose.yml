services:
  scans-api:
    build: .
    image: scans-api:0.1.0
    container_name: scans-api
    restart: unless-stopped
    # network_host so we can hit localhost:8918 (coord), :27017 (mongo), :7687 (neo4j)
    # without extra Docker networking.
    network_mode: host
    volumes:
      - ${SCANNER_HOME}/scanners/work/chimangoscan.db:/data/chimangoscan.db:ro
      - ${SCANNER_HOME}/scanners/work/chimangoscan.db-wal:/data/chimangoscan.db-wal:ro
      - ${SCANNER_HOME}/scanners/work/chimangoscan.db-shm:/data/chimangoscan.db-shm:ro
      - ${SCANNER_HOME}/scanner-report:/data/scanner-report:ro
    environment:
      QUEUE_DB: /data/chimangoscan.db
      MONGO_URI: mongodb://127.0.0.1:27017
      COORD_URL: http://127.0.0.1:8918
      CORS_ORIGINS: "http://localhost,http://localhost:5173"
      PORT: "8920"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
